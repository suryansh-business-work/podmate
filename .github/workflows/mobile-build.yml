name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        type: choice
        options:
          - android
          - ios
          - all
        default: all
      profile:
        description: 'Build profile'
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build-android:
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    outputs:
      build_url: ${{ steps.build.outputs.build_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Build Android APK
        id: build
        working-directory: app
        run: |
          BUILD_OUTPUT=$(eas build -p android --profile ${{ inputs.profile }} --non-interactive --json 2>&1 | tail -1)
          BUILD_URL=$(echo "$BUILD_OUTPUT" | jq -r '.[0].artifacts.buildUrl // empty')
          BUILD_ID=$(echo "$BUILD_OUTPUT" | jq -r '.[0].id // empty')
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "### Android Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build ID:** $BUILD_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Download:** $BUILD_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Download and upload APK to Slack
        if: success() && steps.build.outputs.build_url != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_BUILD_CHANNEL }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H-%M-%S')
          FILENAME="PartyWings-Android-${{ inputs.profile }}-${TIMESTAMP}.apk"
          curl -L -o "$FILENAME" "${{ steps.build.outputs.build_url }}"
          if [[ -f "$FILENAME" && -s "$FILENAME" ]]; then
            curl -F "file=@${FILENAME}" \
                 -F "channels=${SLACK_CHANNEL}" \
                 -F "initial_comment=📱 Android ${{ inputs.profile }} build — ${TIMESTAMP} (branch: ${{ github.ref_name }})" \
                 -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
                 https://slack.com/api/files.upload
          fi

      - name: Notify Slack — Android
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ job.status == 'success' && '✅ Android Build Succeeded' || '❌ Android Build Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Profile:*\n${{ inputs.profile }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Status:*\n${{ job.status }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.build.outputs.build_url && format('*Download APK:* <{0}|Click here>', steps.build.outputs.build_url) || '*Download:* Build URL not available' }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "PartyWings Mobile Build | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                    }
                  ]
                }
              ]
            }

  build-ios:
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    outputs:
      build_url: ${{ steps.build.outputs.build_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Build iOS
        id: build
        working-directory: app
        run: |
          BUILD_OUTPUT=$(eas build -p ios --profile ${{ inputs.profile }} --non-interactive --json 2>&1 | tail -1)
          BUILD_URL=$(echo "$BUILD_OUTPUT" | jq -r '.[0].artifacts.buildUrl // empty')
          BUILD_ID=$(echo "$BUILD_OUTPUT" | jq -r '.[0].id // empty')
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "### iOS Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build ID:** $BUILD_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Download:** $BUILD_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Download and upload IPA to Slack
        if: success() && steps.build.outputs.build_url != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_BUILD_CHANNEL }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H-%M-%S')
          FILENAME="PartyWings-iOS-${{ inputs.profile }}-${TIMESTAMP}.ipa"
          curl -L -o "$FILENAME" "${{ steps.build.outputs.build_url }}"
          if [[ -f "$FILENAME" && -s "$FILENAME" ]]; then
            curl -F "file=@${FILENAME}" \
                 -F "channels=${SLACK_CHANNEL}" \
                 -F "initial_comment=🍎 iOS ${{ inputs.profile }} build — ${TIMESTAMP} (branch: ${{ github.ref_name }})" \
                 -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
                 https://slack.com/api/files.upload
          fi

      - name: Notify Slack — iOS
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ job.status == 'success' && '✅ iOS Build Succeeded' || '❌ iOS Build Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Profile:*\n${{ inputs.profile }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Status:*\n${{ job.status }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.build.outputs.build_url && format('*Download IPA:* <{0}|Click here>', steps.build.outputs.build_url) || '*Download:* Build URL not available' }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "PartyWings Mobile Build | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                    }
                  ]
                }
              ]
            }
