name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - service: server
            dockerfile: ./server/Dockerfile
            port: 4039
          - service: admin-panel
            dockerfile: ./admin-panel/Dockerfile
            port: 4040
          - service: website
            dockerfile: ./website/Dockerfile
            port: 4041
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            VITE_API_URL=https://podify-api.exyconn.com/graphql
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/partywings-${{ matrix.service }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/partywings-${{ matrix.service }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: docker-compose.prod.yml
          target: /opt/partywings

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /opt/partywings
            cp docker-compose.prod.yml docker-compose.yml
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export MONGODB_URI="${{ secrets.MONGODB_URI }}"
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            docker compose down --remove-orphans || true
            docker compose pull
            docker compose up -d
            docker image prune -f
            echo "=== Deployment Health Check ==="
            sleep 10
            for port in 4039 4040 4041; do
              if curl -sf -o /dev/null http://localhost:$port; then
                echo "✅ Port $port is healthy"
              else
                echo "❌ Port $port is NOT responding"
              fi
            done
